<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Seat Searcher</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Seat Finder</h2>
    <div class="card p-4 shadow">
        <div class="row g-3">
            <div class="col-md-4">
                <input type="number" id="username" class="form-control" placeholder="Enter Username">
            </div>
            
        <div class="col-md-4">
            <select id="category" class="form-select">
                <option value="">Select Category</option>
                <option value="primary">Primary</option>
                <option value="secondary">Secondary</option>
                <option value="junior">Junior</option>
                <option value="higher">Higher Secondary</option>
            </select>
        </div>  

        <div class="col-md-4">
            <button class="btn btn-primary w-100" onclick="searchSeat()">Search</button>
        </div>

    </div>

</div>

<div class="result text-center mt-4" id="result"></div>

    

</div>



<script src="script.js"></script>

</body>
</html>
